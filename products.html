<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mandas Music – Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="site-wrapper">
      <header>
        <div class="header-inner">
          <div class="logo">Mandas <span>Music</span></div>

          <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>

          <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="products.html">Products</a></li>
              <li>
                <a href="cart.html" class="cart-link"
                  >Cart
                  <span class="cart-count-badge" data-cart-count>0</span></a
                >
              </li>
              <li>
                <button id="dark-toggle" class="btn btn-small" type="button">
                  Dark mode
                </button>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <h1>Products</h1>
        <p>
          Browse our selection of instruments and gear. Click a product to see
          more details.
        </p>

        <input type="text" id="search" placeholder="Search products..." />

        <div class="filters">
          <button class="btn btn-small" data-filter="All" type="button">
            All
          </button>
          <button class="btn btn-small" data-filter="Guitars" type="button">
            Guitars
          </button>
          <button class="btn btn-small" data-filter="Amps" type="button">
            Amps
          </button>
          <button class="btn btn-small" data-filter="Studio" type="button">
            Studio
          </button>
          <button class="btn btn-small" data-filter="Accessories" type="button">
            Accessories
          </button>
        </div>

        <section class="product-grid" data-product-grid></section>
      </main>

      <footer>
        <p>&copy; 2026 Mandas Music. All rights reserved.</p>
      </footer>
    </div>

    <div id="cart-toast" class="cart-toast">Added to cart!</div>

    <script src="js/main.js"></script>
  </body>
</html>
