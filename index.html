<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mandas Music – Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="site-wrapper">
      <header>
        <div class="header-inner">
          <div class="logo">Mandas <span>Music</span></div>

          <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>

          <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="products.html">Products</a></li>
              <li>
                <a href="cart.html" class="cart-link">
                  Cart
                  <span class="cart-count-badge" data-cart-count>0</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero">
          <div class="hero-text">
            <h1>Your sound. Your stage.</h1>
            <p>
              Mandas Music is your local online music shop for guitars, amps,
              studio gear, and more. Curated instruments for players who care
              about tone.
            </p>
            <a href="products.html" class="btn">Browse products</a>
          </div>

          <picture>
            <img
              src="images/hero-guitar.jpg"
              alt="Electric guitar on stage"
              onerror="this.src = 'images/product-fallback.jpg'"
            />
          </picture>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 Mandas Music. All rights reserved.</p>
      </footer>
    </div>

    <div id="cart-toast" class="cart-toast">Added to cart!</div>

    <script src="js/main.js"></script>
  </body>
</html>
