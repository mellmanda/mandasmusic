<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mandas Music – Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="music-notes">
      <span>♪</span>
      <span>♫</span>
      <span>♬</span>
      <span>♪</span>
      <span>♫</span>
      <span>♬</span>
      <span>♪</span>
      <span>♫</span>
      <span>♬</span>
      <span>♪</span>
    </div>

    <div class="site-wrapper">
      <header>
        <div class="header-inner">
          <div class="logo">Mandas <span>Music</span></div>

          <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="products.html">Products</a></li>
              <li>
                <a href="cart.html" class="cart-link">
                  Cart
                  <span class="cart-count-badge" data-cart-count>0</span>
                </a>
              </li>
              <li></li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <h1>Your Cart</h1>
        <p>Review your items before checkout.</p>

        <table class="cart-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Total</th>
            </tr>
          </thead>

          <tbody data-cart-items></tbody>
        </table>

        <p class="cart-total">Cart total: <span data-cart-total>0kr</span></p>
      </main>

      <footer>
        <p>&copy; 2026 Mandas Music. All rights reserved.</p>
      </footer>
    </div>

    <div id="cart-toast" class="cart-toast">Added to cart!</div>

    <script src="js/main.js"></script>
  </body>
</html>
